# Copy to secret.yaml (do not commit real values), edit, then:
#   kubectl apply -f secret.yaml -n med-assert
#
# Or create imperatively:
#   kubectl create secret generic med-assert-env -n med-assert \
#     --from-literal=NCBI_API_KEY=... \
#     --from-literal=OPENAI_API_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: med-assert-env
  namespace: med-assert
  labels:
    app.kubernetes.io/name: med-assert
type: Opaque
stringData:
  NCBI_API_KEY: ""
  NCBI_EMAIL: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
