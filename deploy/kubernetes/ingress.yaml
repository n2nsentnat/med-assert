# Optional: enable TLS and set host before applying.
# kubectl apply -f ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: med-assert-api
  namespace: med-assert
  labels:
    app.kubernetes.io/name: med-assert
    app.kubernetes.io/component: api
  annotations:
    # nginx ingress example — adjust for your controller
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: med-assert.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: med-assert-api
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - med-assert.example.com
  #     secretName: med-assert-tls
