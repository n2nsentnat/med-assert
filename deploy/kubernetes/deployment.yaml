apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-assert-api
  namespace: med-assert
  labels:
    app.kubernetes.io/name: med-assert
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-assert
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-assert
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          # Build and push your image, then set in kustomization or override:
          #   kubectl set image deploy/med-assert-api api=your-registry/med-assert:v0.1.0 -n med-assert
          image: med-assert:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Optional Secret (create from secret.example.yaml). If absent, pod still starts.
          envFrom:
            - secretRef:
                name: med-assert-env
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/med_assert_output
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          emptyDir: {}
